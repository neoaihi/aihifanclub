<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>掲示板</title>
    <style>
        body {
            font-family: "MS Pゴシック", "MS P Gothic", sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 10px;
            background-color: #000;
            color: #0f0;
        }
        h1 {
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            border: 2px solid #0f0;
            padding: 10px;
            text-align: center;
            font-size: 24px;
        }
        .post-form {
            background-color: #111;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #0f0;
        }
        textarea, input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #0f0;
            border-radius: 0;
            box-sizing: border-box;
            background-color: #000;
            color: #0f0;
            font-family: "MS Pゴシック", "MS P Gothic", monospace;
            font-size: 12px;
        }
        button {
            background-color: #0f0;
            color: #000;
            padding: 8px 20px;
            border: 2px solid #0f0;
            border-radius: 0;
            cursor: pointer;
            font-weight: bold;
            font-family: "MS Pゴシック", "MS P Gothic", sans-serif;
        }
        button:hover {
            background-color: #000;
            color: #0f0;
        }
        .posts {
            display: flex;
            flex-direction: column-reverse;
        }
        .post {
            background-color: #111;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #0f0;
            color: #0f0;
            font-size: 12px;
        }
        .post-number {
            display: inline-block;
            background-color: #0f0;
            color: #000;
            padding: 2px 6px;
            margin-right: 8px;
            font-weight: bold;
        }
        .post-header {
            margin-bottom: 8px;
            border-bottom: 1px solid #0f0;
            padding-bottom: 5px;
        }
        .post-name {
            font-weight: bold;
        }
        .post-time {
            font-size: 10px;
            color: #080;
        }
        .post-message {
            margin-top: 10px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 10px;
            border-top: 2px solid #0f0;
        }
        .back-link a {
            color: #0f0;
            text-decoration: underline;
        }
        .back-link a:hover {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>★ 掲示板 ★</h1>
    <div class="post-form">
        <input type="text" id="name" placeholder="名前 (名無しでも可)">
        <textarea id="message" placeholder="メッセージを入力してください（200文字まで可）" rows="4"></textarea>
        <button onclick="addPost()">[ 投稿 ]</button>
    </div>
    <div class="posts" id="posts"></div>
    <div class="back-link">
        <a href="index.html">[ トップに戻る ]</a>
    </div>

    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, serverTimestamp, update } 
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC3bNkmqjyKxSulJPpmM3WFGAsa4eFKHCE",
    authDomain: "board-323ec.firebaseapp.com",
    databaseURL: "https://board-323ec-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "board-323ec",
    storageBucket: "board-323ec.firebasestorage.app",
    messagingSenderId: "797665083554",
    appId: "1:797665083554:web:016e253418e6be5534d7fb",
    measurementId: "G-PQK27T7R6Q"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dbRef = ref(db, 'chat');

  // --- 投稿処理 ---
  window.addPost = async function() {
    const nameEl = document.getElementById('name');
    const msgEl = document.getElementById('message');
    const submitBtn = document.querySelector('button');
    
    if (!msgEl.value.trim()) {
      alert('メッセージを入力してください');
      return;
    }

    // ブラウザ固有IDの取得（LocalStorage方式）
    let browserId = localStorage.getItem('bbs_browser_id');
    if (!browserId) {
      browserId = "id_" + Math.random().toString(36).slice(2);
      localStorage.setItem('bbs_browser_id', browserId);
    }

    submitBtn.disabled = true; // UI制限開始

    const timeData = serverTimestamp();
    const newPostKey = push(dbRef).key; // 投稿用の新しいIDを発行

    // 【重要】メッセージとタイマーを同時に更新（Atomic Update）
    const updates = {};
    updates[`/chat/${newPostKey}`] = {
      name: nameEl.value || '名無し',
      message: msgEl.value,
      time: new Date().toLocaleString('ja-JP'),
      timestamp: timeData,
      browserId: browserId // ルール照合用
    };
    updates[`/user_timers/${browserId}`] = timeData;

    try {
      await update(ref(db), updates); 
      msgEl.value = '';
      // 名前は残しておきたい場合は消さなくてOK（今回はリセットします）
      // nameEl.value = ''; 
    } catch (error) {
      console.error("Firebase Block:", error);
      alert('【連投制限】5秒ほど待ってから投稿してください。');
    } finally {
      // 5秒間のカウントダウン演出
      let count = 5;
      const timer = setInterval(() => {
        count--;
        submitBtn.textContent = `待機中 (${count}s)`;
        if (count <= 0) {
          clearInterval(timer);
          submitBtn.disabled = false;
          submitBtn.textContent = "[ 投稿 ]";
        }
      }, 1000);
    }
  };

  // --- 表示処理（以前の投稿が消えないように修正） ---
  onValue(dbRef, (snapshot) => {
    const data = snapshot.val();
    const postsDiv = document.getElementById('posts');
    postsDiv.innerHTML = ""; 

    if (data) {
      // 1. オブジェクトを配列に変換
      // 2. timestamp（サーバー時間）順に並び替え
      const postList = Object.entries(data)
        .map(([key, val]) => val)
        .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

      postList.forEach((post, index) => {
        // メッセージデータであることを確認（タイマー用データなどが混入しても無視する）
        if (!post.message) return;

        const postHtml = `
          <div class="post">
            <div class="post-header">
              <span class="post-number">${index + 1}</span>
              <span class="post-name">${post.name}</span>
              <div class="post-time">${post.time}</div>
            </div>
            <div class="post-message">${post.message}</div>
          </div>
        `;
        // 新しいものが上に来るように配置（CSSの逆順表示に合わせて調整）
        postsDiv.insertAdjacentHTML('afterbegin', postHtml);
      });
    }
  });
</script>
</body>
</html>
