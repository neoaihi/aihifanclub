<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>掲示板</title>
    <style>
        body {
            font-family: "MS Pゴシック", "MS P Gothic", sans-serif;
            max-width: 600px;
            margin: 20px auto;
            padding: 10px;
            background-color: #000;
            color: #0f0;
        }
        h1 {
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            border: 2px solid #0f0;
            padding: 10px;
            text-align: center;
            font-size: 24px;
        }
        .post-form {
            background-color: #111;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #0f0;
        }
        textarea, input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #0f0;
            border-radius: 0;
            box-sizing: border-box;
            background-color: #000;
            color: #0f0;
            font-family: "MS Pゴシック", "MS P Gothic", monospace;
            font-size: 12px;
        }
        button {
            background-color: #0f0;
            color: #000;
            padding: 8px 20px;
            border: 2px solid #0f0;
            border-radius: 0;
            cursor: pointer;
            font-weight: bold;
            font-family: "MS Pゴシック", "MS P Gothic", sans-serif;
        }
        button:hover {
            background-color: #000;
            color: #0f0;
        }
        .posts {
            display: flex;
            flex-direction: column-reverse;
        }
        .post {
            background-color: #111;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #0f0;
            color: #0f0;
            font-size: 12px;
        }
        .post-number {
            display: inline-block;
            background-color: #0f0;
            color: #000;
            padding: 2px 6px;
            margin-right: 8px;
            font-weight: bold;
        }
        .post-header {
            margin-bottom: 8px;
            border-bottom: 1px solid #0f0;
            padding-bottom: 5px;
        }
        .post-name {
            font-weight: bold;
        }
        .post-time {
            font-size: 10px;
            color: #080;
        }
        .post-message {
            margin-top: 10px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 10px;
            border-top: 2px solid #0f0;
        }
        .back-link a {
            color: #0f0;
            text-decoration: underline;
        }
        .back-link a:hover {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>★ 掲示板 ★</h1>
    <div class="post-form">
        <input type="text" id="name" placeholder="名前 (名無しでも可)">
        <textarea id="message" placeholder="メッセージを入力してください（200文字まで可）" rows="4"></textarea>
        <button onclick="addPost()">[ 投稿 ]</button>
    </div>
    <div class="posts" id="posts"></div>
    <div class="back-link">
        <a href="index.html">[ トップに戻る ]</a>
    </div>

<script type="module">
  // 1. Firebaseから必要な機能をインポートします
  // なぜ必要か：データベースを操作するための「道具（関数）」を使えるようにするため
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, serverTimestamp, update } 
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // 2. あなたのFirebaseプロジェクトへの接続情報です
  const firebaseConfig = {
    apiKey: "AIzaSyC3bNkmqjyKxSulJPpmM3WFGAsa4eFKHCE",
    authDomain: "board-323ec.firebaseapp.com",
    databaseURL: "https://board-323ec-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "board-323ec",
    storageBucket: "board-323ec.firebasestorage.app",
    messagingSenderId: "797665083554",
    appId: "1:797665083554:web:016e253418e6be5534d7fb",
    measurementId: "G-PQK27T7R6Q"
  };

  // 3. Firebaseを起動（初期化）し、データベースへの窓口を作ります
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dbRef = ref(db, 'chat');

  // 4. 投稿ボタンの処理（HTMLの onclick="addPost()" から呼ばれます）
  window.addPost = async function() {
    // 画面の入力欄やボタンを取得します
    const nameInput = document.getElementById('name');
    const messageInput = document.getElementById('message');
    const submitBtn = document.querySelector('button');
    
    const name = nameInput.value || '名無し';
    const message = messageInput.value;
    
    // 入力が空なら何もしません
    if (!message.trim()) return;

    // 5. 【UI保護】ボタンを無効化し、カウントダウンを開始します
    // なぜ必要か：ユーザーが連打して何度もリクエストを送るのを防ぐため
    submitBtn.disabled = true;
    let timeLeft = 5;
    const timer = setInterval(() => {
        timeLeft--;
        submitBtn.textContent = `待機中 (${timeLeft}s)`;
        if (timeLeft <= 0) {
            clearInterval(timer);
            submitBtn.disabled = false;
            submitBtn.textContent = "[ 投稿 ]";
        }
    }, 1000);

    // 6. サーバー上の現在時刻を取得する「予約」をします
    const timeData = serverTimestamp();

    // 7. メッセージを保存する場所（ユニークなID）をあらかじめ確保します
    const newPostKey = push(ref(db, 'chat')).key;

    // 8. 「お願いリスト（オブジェクト）」を作成し、指示を詰め込みます
    // なぜ必要か：これらを「一括(update)」で送ることで、ルールの隙をなくすため
    const updates = {};
    updates[`/chat/${newPostKey}`] = {
      name: name,
      message: message,
      time: new Date().toLocaleString('ja-JP'),
      timestamp: timeData
    };
    updates['/chat/lastUpdate'] = timeData; // 全体ロック用の時間を更新

    try {
      // 9. 用意したリストを一斉送信します
      await update(ref(db), updates); 
      messageInput.value = ''; // 成功したら入力欄をリセット
    } catch (error) {
      // 10. 5秒経っていない等の理由でサーバーに拒否された場合
      console.error("ブロックされました:", error);
      alert("【連投制限】5秒待ってください！");
    }
  }; // ← ここに閉じカッコが必要でした

  // 11. データベースの更新をリアルタイムで監視して画面に表示します
  // なぜ必要か：自分や他人の投稿がすぐに画面に反映されるようにするため
  onValue(dbRef, (snapshot) => {
    const data = snapshot.val();
    const postsDiv = document.getElementById('posts');
    postsDiv.innerHTML = ""; 

    if (data) {
      // 12. メタデータ（lastUpdate）以外の投稿内容だけを抽出して表示用に加工します
      const entries = Object.entries(data)
        .filter(([key]) => key !== 'lastUpdate')
        .map(([key, value]) => value);

      entries.forEach((post, index) => {
        const postHtml = `
          <div class="post">
            <div class="post-header">
              <span class="post-number">${index + 1}</span>
              <span class="post-name">${post.name}</span>
              <div class="post-time">${post.time}</div>
            </div>
            <div class="post-message">${post.message}</div>
          </div>
        `;
        postsDiv.insertAdjacentHTML('beforeend', postHtml);
      });
    }
  });
</script>
</body>
</html>
